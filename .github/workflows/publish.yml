name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Releases and upload assets
  packages: write   # push to GitHub Packages NuGet feed

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── 1. Build & Test ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MonadicSharp.sln

      - name: Build
        run: dotnet build MonadicSharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MonadicSharp.sln --configuration Release --no-build --verbosity normal

  # ── 2. Pack & Publish ─────────────────────────────────────────────────────
  release:
    name: Pack & Publish
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MonadicSharp.sln

      - name: Build
        run: dotnet build MonadicSharp.sln --configuration Release --no-restore

      # Extract semver from the tag (strips leading 'v')
      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack MonadicSharp.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkgs \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: List packages
        run: ls -lh ./nupkgs/

      # ── GitHub Release with .nupkg asset ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MonadicSharp ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./nupkgs/*.nupkg

      # ── GitHub Packages (NuGet feed) ────────────────────────────────────────
      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/Danny4897/index.json" \
            --name github \
            --username Danny4897 \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source github \
            --skip-duplicate

      # ── NuGet.org ────────────────────────────────────────────────────────────
      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
