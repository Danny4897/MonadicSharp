name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore MonadicSharp.csproj
          dotnet restore tests/MonadicSharp.Tests/MonadicSharp.Tests.csproj

      - name: Build
        run: dotnet build MonadicSharp.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/MonadicSharp.Tests/MonadicSharp.Tests.csproj --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack MonadicSharp.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
